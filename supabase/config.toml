# Supabase project configuration.
# Run `supabase link --project-ref <ref>` once, then `supabase db push` to apply migrations.
project_id = "expense-tracker"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = ["http://localhost:4200/auth/callback"]
jwt_expiry = 3600
enable_signup = true

# Google OAuth for LOCAL Supabase stack (`supabase start`) only.
# Hosted Supabase reads its Google credentials from the dashboard
# (Authentication → Providers → Google), so this block is unused for the
# remote workflow. To enable local Google sign-in: flip `enabled = true`
# and set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET in supabase/.env.
[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = "http://localhost:54321/auth/v1/callback"
url = ""

[functions.sync-gmail]
verify_jwt = true
